<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ascala — Intelligent Validation Studio</title>
  <link rel="icon" href="assets/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx?v=4"></script>
  <script type="text/babel" src="Login.jsx?v=4"></script>
  <script type="text/babel" src="Panel1.jsx?v=4"></script>
  <script type="text/babel" src="Panel2.jsx?v=4"></script>
  <script type="text/babel" src="Report.jsx?v=4"></script>
  <script type="text/babel" src="Panel3.jsx?v=4"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "density": "cozy",
      "accentMood": "warm"
    }/*EDITMODE-END*/;

    const { useState, useReducer, useEffect, useRef } = React;

    function reducer(state, action) {
      switch (action.type) {
        case 'personaDone': return { ...state, personaDone: true };
        case 'setSelected': return { ...state, selected: action.selected };
        case 'goSim': return { ...state, step: 3, simPhase: 'confirm' };
        case 'setSimPhase':
          if (action.simPhase === 'cancel') return { ...state, step: 2, simPhase: 'confirm' };
          return { ...state, simPhase: action.simPhase };
        case 'simDone': return { ...state, simPhase: 'done' };
        case 'setStep': return { ...state, step: action.step };
        case 'reset': return { step: 1, personaDone: false, selected: [], simPhase: 'confirm' };
        default: return state;
      }
    }

    function App() {
      const [loggedIn, setLoggedIn] = useState(false);
      const [onboardingDone, setOnboardingDone] = useState(false);
      const [onboardingFocus, setOnboardingFocus] = useState(null);
      const [dark, setDark] = useState(false);
      const [tokens] = useState(20);
      const [mobileTab, setMobileTab] = useState('chat');
      const [isNarrow, setIsNarrow] = useState(() => window.innerWidth < 960);
      const [panelSplit, setPanelSplit] = useState(1 / 3); // fraction allocated to the left (chat) panel

      useEffect(() => {
        const onResize = () => setIsNarrow(window.innerWidth < 960);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      const onDividerMouseDown = (e) => {
        e.preventDefault();
        document.body.classList.add('dragging-panel');
        const container = e.currentTarget.parentElement;
        const rect = container.getBoundingClientRect();
        const onMove = (me) => {
          const x = me.clientX - rect.left;
          const ratio = Math.max(0.22, Math.min(0.6, x / rect.width));
          setPanelSplit(ratio);
        };
        const onUp = () => {
          document.body.classList.remove('dragging-panel');
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };

      // Project assets — collected during onboarding, surfaced to chat/studio.
      const [files, setFiles] = useState([]);
      const [productUrl, setProductUrl] = useState('https://www.canva.com');
      const [screenshots, setScreenshots] = useState([]);
      const [videos, setVideos] = useState([]);
      // The studio + reports always use the bundled Canva dataset.
      const selectedWebsite = 'canva';
      const [reportId, setReportId] = useState(null);
      const [tweaksOpen, setTweaksOpen] = useState(false);
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

      const [studio, dispatch] = useReducer(reducer, {
        step: 1,
        personaDone: false,
        selected: [],
        simPhase: 'confirm'
      });

      useEffect(() => {
        document.body.classList.toggle('dark', dark);
      }, [dark]);

      // edit mode hook (Cursor edit-mode integration)
      useEffect(() => {
        const onMsg = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const setTweak = (k, v) => {
        setTweaks(t => ({ ...t, [k]: v }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
        if (k === 'theme') setDark(v === 'dark');
      };

      useEffect(() => {
        if (tweaks.theme === 'dark') setDark(true);
      }, []);

      useEffect(() => {
        window.__openReport = (id) => setReportId(id);
      }, []);

      const goBackToOnboarding = (focus) => {
        setOnboardingFocus(focus || null);
        setOnboardingDone(false);
      };

      if (!loggedIn) return React.createElement(Login, { onEnter: () => setLoggedIn(true) });

      if (!onboardingDone) {
        return React.createElement(React.Fragment, null,
          React.createElement('div', { className: 'stage onboarding-stage' },
            React.createElement(TopBar, {
              dark, onToggleTheme: () => { setDark(d => !d); setTweak('theme', dark ? 'light' : 'dark'); },
              tokens
            }),
            React.createElement(Onboarding, {
              productUrl, setProductUrl,
              files, setFiles,
              screenshots, setScreenshots,
              videos, setVideos,
              focusSection: onboardingFocus,
              onContinue: () => { setOnboardingFocus(null); setOnboardingDone(true); }
            })
          ),
          tweaksOpen && React.createElement(TweaksPanel, { tweaks, setTweak, setTweaksOpen, onReset: () => { setLoggedIn(false); setOnboardingDone(false); dispatch({ type: 'reset' }); } })
        );
      }

      const leftPct = Math.round(panelSplit * 100);
      const rightPct = 100 - leftPct;

      return React.createElement(React.Fragment, null,
        React.createElement('div', { className: 'stage' + (isNarrow ? ' narrow' : '') },
          React.createElement(TopBar, {
            dark, onToggleTheme: () => { setDark(d => !d); setTweak('theme', dark ? 'light' : 'dark'); },
            tokens,
            productUrl,
            contextCount: files.length,
            onChangePrototype: () => goBackToOnboarding('url'),
            onAddContext: () => goBackToOnboarding('context')
          }),
          isNarrow && React.createElement('div', { className: 'mobile-tabs' },
            [
              { id: 'chat', label: 'Intelligence' },
              { id: 'studio', label: 'Studio' }
            ].map(t =>
              React.createElement('button', {
                key: t.id,
                className: 'mobile-tab' + (mobileTab === t.id ? ' active' : ''),
                onClick: () => setMobileTab(t.id)
              }, t.label)
            )
          ),
          React.createElement('div', {
            className: 'panels two-panels',
            'data-mobile': isNarrow ? mobileTab : 'all',
            style: { gridTemplateColumns: isNarrow ? '1fr' : `${leftPct}fr 12px ${rightPct}fr` }
          },
            React.createElement(Chat, { onMessageSent: () => {} }),
            !isNarrow && React.createElement('div', { className: 'panel-divider', onMouseDown: onDividerMouseDown }),
            React.createElement(Studio, { state: studio, dispatch, selectedWebsite })
          )
        ),
        reportId && React.createElement(Report, { testId: reportId, onClose: () => setReportId(null), selectedWebsite }),
        tweaksOpen && React.createElement(TweaksPanel, { tweaks, setTweak, setTweaksOpen, onReset: () => { setLoggedIn(false); setOnboardingDone(false); dispatch({ type: 'reset' }); } })
      );
    }

    function TweaksPanel({ tweaks, setTweak, setTweaksOpen, onReset }) {
      return React.createElement('div', { className: 'tweaks-panel' },
        React.createElement('div', { className: 'tweaks-head' },
          'Tweaks',
          React.createElement('button', { onClick: () => setTweaksOpen(false), style: { color: 'var(--ink-40)' } },
            React.createElement(IconX, { width: 12, height: 12 })
          )
        ),
        React.createElement('div', { className: 'tweaks-body' },
          React.createElement('div', { className: 'tweak-row' },
            React.createElement('label', null, 'Theme'),
            React.createElement('div', { className: 'tweak-opts' },
              ['light', 'dark'].map(m =>
                React.createElement('button', {
                  key: m,
                  className: 'tweak-opt' + (tweaks.theme === m ? ' active' : ''),
                  onClick: () => setTweak('theme', m)
                }, m)
              )
            )
          ),
          React.createElement('div', { className: 'tweak-row' },
            React.createElement('label', null, 'Density'),
            React.createElement('div', { className: 'tweak-opts' },
              ['cozy', 'compact'].map(m =>
                React.createElement('button', {
                  key: m,
                  className: 'tweak-opt' + (tweaks.density === m ? ' active' : ''),
                  onClick: () => setTweak('density', m)
                }, m)
              )
            )
          ),
          React.createElement('div', { className: 'tweak-row' },
            React.createElement('label', null, 'Reset flow'),
            React.createElement('button', { className: 'tweak-opt', onClick: onReset }, 'restart')
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
